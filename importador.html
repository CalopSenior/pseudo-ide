<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Importador de Dados — Pseudo-IDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="imp-page">

  <!-- ===== HEADER ===== -->
  <header class="imp-header">
    <div class="imp-header-left">
      <a href="index.html" class="imp-back" title="Voltar para a IDE">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" style="vertical-align:-2px;margin-right:4px">
          <polyline points="15 18 9 12 15 6" />
        </svg>IDE
      </a>
      <span class="imp-app-name">Importador de Dados</span>
      <span class="imp-file-badge" id="imp-file-badge" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" style="vertical-align:-1px;margin-right:4px">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        <span id="imp-file-meta"></span>
        <button class="imp-new-file-btn" onclick="impNewFile()" title="Abrir outro arquivo">✕</button>
      </span>
    </div>
    <div class="imp-header-right">
      <span class="imp-header-hint">Importe CSV, JSON ou TXT e gere código Pseudo diretamente.</span>
    </div>
  </header>

  <!-- ===== DROP ZONE ===== -->
  <div class="imp-drop-wrap">
    <div id="imp-drop" class="imp-drop">
      <input type="file" id="imp-file-input" accept=".csv,.json,.txt,.tsv" style="display:none">
      <div class="imp-drop-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      </div>
      <div class="imp-drop-text">Arraste um arquivo aqui ou clique para selecionar</div>
      <div class="imp-drop-hint">Suporta <strong>.csv</strong>, <strong>.tsv</strong>, <strong>.json</strong>, <strong>.txt</strong></div>
    </div>
  </div>

  <!-- ===== MAIN CONTENT (hidden until file loaded) ===== -->
  <div id="imp-main-content" class="imp-main" style="display:none">

    <!-- Split: Preview + Variables -->
    <div class="imp-split">

      <!-- Left: file preview -->
      <div class="imp-pane imp-preview-pane">
        <div class="imp-pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" style="vertical-align:-2px;margin-right:6px">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>Visualização
        </div>
        <div id="imp-preview" class="imp-preview-body"></div>
      </div>

      <!-- Right: variable definitions -->
      <div class="imp-pane imp-vars-pane">
        <div class="imp-pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" style="vertical-align:-2px;margin-right:6px">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>Variáveis
          <button class="imp-add-btn" onclick="impAddVar()" title="Adicionar variável">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" style="vertical-align:-1px;margin-right:4px">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>Nova variável
          </button>
        </div>
        <div id="imp-vars-list" class="imp-vars-list">
          <p class="imp-empty">Clique em "+ Nova variável" para começar.</p>
        </div>
      </div>
    </div>

    <!-- Bottom: generated code -->
    <div class="imp-code-pane">
      <div class="imp-code-header">
        <span class="imp-pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" style="vertical-align:-2px;margin-right:6px">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>Código gerado
        </span>
        <span class="imp-code-hint">Edite livremente antes de copiar.</span>
        <button id="imp-copy-btn" class="imp-copy-btn" onclick="impCopyCode()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" style="vertical-align:-2px;margin-right:5px">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>Copiar código
        </button>
      </div>
      <textarea id="imp-code-out" class="imp-code-out" spellcheck="false"
        placeholder="// O código aparecerá aqui quando você definir variáveis acima."></textarea>
    </div>

  </div>

  <script src="js/importador.js"></script>
</body>
</html>
